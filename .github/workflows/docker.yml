name: docker
on:
  workflow_dispatch: # manually run
    inputs:
      pkg_path:
        description: 'Package path to publish'
        required: true
        default: 'solana/solana-data-service'
      image:
        description: 'Image name (if differs from package)'
        required: false
        default: 'solana-hotblocks-service'
      release:
        description: 'Release name'
        required: true
        default: 'arrowsquid'
      tag:
        description: 'Tag name'
        required: true
        default: 'latest'

env:
  CI: true

jobs:
  build:
    name: build-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          use: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Push
        env:
          PLATFORM: ${{ matrix.platform }}
          BUILDX_CACHE_FROM: type=gha,scope=${{ matrix.arch }}
          BUILDX_CACHE_TO: type=gha,scope=${{ matrix.arch }},mode=max
        run: ./ops/docker-publish.sh "${{ inputs.release }}" "${{ inputs.tag }}" "${{ inputs.pkg_path }}" "${{ inputs.image }}"

  merge:
    name: merge-manifests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create multi-arch manifests
        run: ./ops/docker-merge.sh "${{ inputs.release }}" "${{ inputs.tag }}" "${{ inputs.pkg_path }}" "${{ inputs.image }}"
