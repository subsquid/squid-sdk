name: docker
on:
  workflow_dispatch: # manually run
    inputs:
      pkg_path:
        description: 'Package path to publish'
        required: true
        default: 'solana/solana-data-service'
      image:
        description: 'Image name (if differs from package)'
        required: false
        default: 'solana-hotblocks-service'
      release:
        description: 'Release name'
        required: true
        default: 'arrowsquid'
      tag:
        description: 'Tag name'
        required: true
        default: 'latest'
      platform:
        description: 'Platform to build'
        required: false
        default: 'linux/amd64'
        type: choice
        options:
          - linux/amd64
          - linux/arm64

env:
  CI: true

jobs:
  publish:
    name: docker-publish
    runs-on: ${{ inputs.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          use: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Publish
        env:
          PLATFORM: ${{ inputs.platform }}
          BUILDX_CACHE_FROM: type=gha
          BUILDX_CACHE_TO: type=gha,mode=max
        run: ./ops/docker-publish.sh "${{ inputs.release }}" "${{ inputs.tag }}" "${{ inputs.pkg_path }}" "${{ inputs.image }}"
