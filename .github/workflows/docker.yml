name: docker
on:
  workflow_dispatch: # manually run
    inputs:
      pkg_path:
        description: 'Package path to publish'
        required: true
        default: 'solana/solana-data-service'
      image:
        description: 'Image name (if differs from package)'
        required: false
        default: 'solana-hotblocks-service'
      release:
        description: 'Release name'
        required: true
        default: 'arrowsquid'
      tag:
        description: 'Tag name'
        required: true
        default: 'latest'

env:
  CI: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          use: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push by digest
        env:
          PLATFORM: ${{ matrix.platform }}
          BUILDX_CACHE_FROM: type=gha,scope=build-${{ matrix.platform }}
          BUILDX_CACHE_TO: type=gha,scope=build-${{ matrix.platform }},mode=max
        run: ./ops/docker-publish.sh "${{ inputs.pkg_path }}" "${{ inputs.image }}"

      - name: Upload digests
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest and push
        run: ./ops/docker-merge.sh "${{ inputs.release }}" "${{ inputs.tag }}" "${{ inputs.pkg_path }}" "${{ inputs.image }}"
