name: release
on:
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode
        required: true
        type: choice
        options:
          - release
          - prerelease
        default: release

permissions:
  id-token: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: ${{ inputs.mode }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.mode == 'release' && 'release/arrowsquid' || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Configure git user
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

      - name: Install dependencies
        run: node common/scripts/install-run-rush.js install

      - name: Build project
        run: node common/scripts/install-run-rush.js build

      - name: Save existing tags
        if: inputs.mode == 'release'
        run: git tag -l | sort > /tmp/tags-before.txt

      - name: Publish npm packages
        run: |
          if [ "${{ inputs.mode }}" = "release" ]; then
            node common/scripts/install-run-rush.js publish --include-all --version-policy npm --target-branch release/arrowsquid --publish --tag latest
          else
            commit_hash=$(git rev-parse HEAD)
            node common/scripts/install-run-rush.js publish --apply --version-policy npm --partial-prerelease --publish --tag ${{ github.ref_name }} --prerelease-name ${{ github.ref_name }}.${commit_hash::6}
          fi
        env:
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Publish changelogs to GitHub releases
        if: inputs.mode == 'release'
        run: |
          new_tags=$(comm -13 /tmp/tags-before.txt <(git tag -l | sort))

          if [ -z "$new_tags" ]; then
            echo "No new tags found, skipping GitHub release"
            exit 0
          fi

          : > /tmp/release-notes.md

          for tag in $new_tags; do
            pkg_name="${tag%_v*}"
            version="${tag##*_v}"

            pkg_dir=$(node -e "
              const fs = require('fs');
              const json = fs.readFileSync('./rush.json', 'utf8').replace(/\/\*[\s\S]*?\*\/|\/\/.*/g, '');
              const p = JSON.parse(json).projects.find(p => p.packageName === process.argv[1]);
              if (p) console.log(p.projectFolder);
            " -- "$pkg_name")

            if [ -z "$pkg_dir" ] || [ ! -f "$pkg_dir/CHANGELOG.md" ]; then
              echo "Skipping $tag: no changelog found"
              continue
            fi

            body=$(awk -v ver="$version" '
              /^## / { if (found) exit; if ($2 == ver) { found=1; next } }
              found { print }
            ' "$pkg_dir/CHANGELOG.md")

            trimmed=$(echo "$body" | sed '/^[[:space:]]*$/d')
            if [ -z "$trimmed" ] || [ "$trimmed" = "_Version update only_" ]; then
              echo "Skipping $tag: version update only"
              continue
            fi

            printf '## %s %s\n%s\n\n' "$pkg_name" "$version" "$body" >> /tmp/release-notes.md
          done

          if [ ! -s /tmp/release-notes.md ]; then
            echo "No meaningful changelog entries, skipping GitHub release"
            exit 0
          fi

          release_tag=$(date -u +%Y-%m-%d)
          n=2
          while git rev-parse "$release_tag" >/dev/null 2>&1; do
            release_tag="$(date -u +%Y-%m-%d).${n}"
            n=$((n + 1))
          done

          git tag "$release_tag"
          git push origin "$release_tag"

          gh release create "$release_tag" \
            --title "$release_tag" \
            --notes-file /tmp/release-notes.md \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
