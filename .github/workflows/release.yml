name: release
on:
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode
        required: true
        type: choice
        options:
          - release
          - prerelease
        default: release

permissions:
  id-token: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: ${{ inputs.mode }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.mode == 'release' && 'release/arrowsquid' || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update npm
        # Pinned to the latest 11.x. npm 12.0.0 prints `npm notice run ...` diagnostics
        # to stderr when running scripts/`npx`, which Rush's built-in `build` treats as a
        # warning and fails on (graphql-server builds via `make` -> `npx tsc`). Unpin once
        # that's resolved (e.g. `@npx tsc` -> `@tsc`, or NPM_CONFIG_LOGLEVEL=warn).
        run: npm install -g npm@11.18.0

      - name: Configure git user
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

      # In `release` mode we build and publish from `release/arrowsquid`, but changes land
      # on `master`. Fast-forward the release branch to `master` (and push it) so a release
      # picks up the latest `master` — e.g. version-policy changes — instead of republishing
      # a stale tree. `--ff-only` fails loudly if `release/arrowsquid` has commits not on
      # `master` (which should be merged back via the bump workflow first) rather than
      # force-moving the branch.
      - name: Sync release branch with master
        if: ${{ inputs.mode == 'release' }}
        run: |
          git fetch origin master
          git merge --ff-only origin/master
          git push origin HEAD:release/arrowsquid

      - name: Install dependencies
        run: node common/scripts/install-run-rush.js install

      - name: Build project
        run: node common/scripts/install-run-rush.js build

      - name: Publish npm packages
        run: |
          if [ "${{ inputs.mode }}" = "release" ]; then
            node common/scripts/install-run-rush.js publish --include-all --version-policy npm --target-branch release/arrowsquid --publish --tag latest
          else
            commit_hash=$(git rev-parse HEAD)
            node common/scripts/install-run-rush.js publish --apply --version-policy npm --partial-prerelease --publish --tag ${{ github.ref_name }} --prerelease-name ${{ github.ref_name }}.${commit_hash::6}
          fi
        env:
          NPM_CONFIG_PROVENANCE: 'true'
