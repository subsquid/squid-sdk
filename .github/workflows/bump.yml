name: bump
on:
  workflow_dispatch:

jobs:
  bump:
    name: increase version numbers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: configure git
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

      - name: create local release branch
        run: git fetch origin release/arrowsquid:release/arrowsquid

      - name: check change files
        run: node common/scripts/install-run-rush.js change --verify --target-branch origin/release/arrowsquid

      # ⚠️ This step is the ONLY thing that maintains `release/arrowsquid`. `rush version --bump`
      # internally branches `version/bump-*` from master, commits the version/CHANGELOG bumps,
      # then merges that branch into `release/arrowsquid` and pushes it (the "merge back" step
      # below only carries the bumps into master). It fires ONLY when there is a real version bump
      # to apply — so a change that produces no bump (rush.json/version-policy edits, workflow or
      # other config changes, an all-`type: none` change-file batch) never reaches
      # `release/arrowsquid`, and the next release publishes a STALE tree.
      # See .agents/skills/squid-sdk-release/SKILL.md ("How release/arrowsquid is maintained").
      - name: bump versions
        run: node common/scripts/install-run-rush.js version --bump --target-branch release/arrowsquid

      - name: merge back release branch
        run: |
          git checkout "${GITHUB_REF##*/}"
          git fetch origin release/arrowsquid
          git merge release/arrowsquid
          git push origin "${GITHUB_REF##*/}"
