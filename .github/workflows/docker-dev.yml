name: docker-dev
on:
  workflow_dispatch: # manually run
    inputs:
      custom_tag:
        description: 'Custom tag to use for the image (defaults to commit hash if empty)'
        required: false
      images:
        description: 'Space-separated list of images to publish (leave empty for all)'
        required: false
      tag_latest:
        description: 'Also publish image with the latest tag'
        type: boolean
        default: true
        required: false

env:
  CI: true

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      custom_tag: ${{ steps.resolve_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: resolve_tag
        run: |
          CUSTOM_TAG="${{ inputs.custom_tag }}"
          if [ -z "$CUSTOM_TAG" ]; then
            CUSTOM_TAG="$(git rev-parse --short HEAD)"
          fi
          echo "tag=$CUSTOM_TAG" >> $GITHUB_OUTPUT

  build:
    name: build-${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          use: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Push
        env:
          PLATFORM: ${{ matrix.platform }}
          BUILDX_CACHE_FROM: type=gha,scope=dev-${{ matrix.arch }}
          BUILDX_CACHE_TO: type=gha,scope=dev-${{ matrix.arch }},mode=max
        run: |
          TAG_LATEST="${{ inputs.tag_latest }}"
          IFS=' ' read -r -a image_array <<< "${{ inputs.images }}"
          ./ops/docker-publish-dev.sh "${{ needs.prepare.outputs.custom_tag }}" "$TAG_LATEST" "${image_array[@]}"

  merge:
    name: merge-manifests
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create multi-arch manifests
        run: |
          TAG_LATEST="${{ inputs.tag_latest }}"
          IFS=' ' read -r -a image_array <<< "${{ inputs.images }}"
          ./ops/docker-merge-dev.sh "${{ needs.prepare.outputs.custom_tag }}" "$TAG_LATEST" "${image_array[@]}"
